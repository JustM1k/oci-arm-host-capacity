name: Create OCI Instance
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
jobs:
  create:
    runs-on: ubuntu-latest
    name: Try to create ARM instance
    steps:
      - uses: actions/checkout@v4
      - name: Install PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
      - name: Save private key to file
        run: |
          echo "${{ secrets.OCI_KEY_CONTENT }}" > /home/runner/oci_private.pem
          chmod 600 /home/runner/oci_private.pem
      - name: Install dependencies
        run: composer update --prefer-dist --no-progress
      - name: Run instance creation
        run: php index.php
        env:
          OCI_REGION: ${{ secrets.OCI_REGION }}
          OCI_USER_ID: ${{ secrets.OCI_USER }}
          OCI_TENANCY_ID: ${{ secrets.OCI_TENANCY }}
          OCI_KEY_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
          OCI_PRIVATE_KEY_FILENAME: /home/runner/oci_private.pem
          OCI_SUBNET_ID: ${{ secrets.OCI_SUBNET_ID }}
          OCI_IMAGE_ID: ${{ secrets.OCI_IMAGE_ID }}
          OCI_OCPUS: 4
          OCI_MEMORY_IN_GBS: 24
          OCI_SHAPE: VM.Standard.A1.Flex
          OCI_MAX_INSTANCES: 1
          OCI_SSH_PUBLIC_KEY: ${{ secrets.OCI_SSH_PUBLIC_KEY }}
          OCI_BOOT_VOLUME_SIZE_IN_GBS: 200
          CACHE_AVAILABILITY_DOMAINS: 1
          TOO_MANY_REQUESTS_TIME_WAIT: 600
